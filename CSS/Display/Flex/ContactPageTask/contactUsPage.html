<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./contactUsStyle.css">
</head>

<body>
    <div class="container">
        <h1>Contact Us</h1>
        <form action="">
            <div class="name">
                <div class="firstName">
                    <label for="firstname">First Name *</label>
                <input type="text" id="firstName" required>
                </div>
                
                <div class="lastName">
                    <label for="lastname">Last Name *</label>
                <input type="text" id="lastName" required>
                </div>
                
            </div>
            <div class="email">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required>
            </div>

            <div class="query">
                <label for="queryType">Query Type *</label>
                <div class="radio-group">
                    <div class="genQuery">
                        <input type="radio" name="query" id="generalEnquiry" required>
                        <label for="generalEnquiry">General Enquiry</label>
                    </div>
                    <div class="suppQuery">
                        <input type="radio" name="query" id="supportRequest">
                        <label for="supportRequest">Support Request</label>
                    </div>
                </div>


            </div>

            <div class="message">
                <label for="message">Message *</label>
                <textarea name="message" id="message" required></textarea>
            </div>
            
            <div class="consent">
            <input type="checkbox" required>
            <p>I consent to being contracted by the team *</p>
            </div>
            
            <button id = "btn" type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
