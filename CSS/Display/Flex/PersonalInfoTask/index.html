<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="steps">
                <div class="number">
                    1
                </div>
                <div class="step">
                    <p>Step 1</p>
                    <p>YOUR INFO</p>
                </div>
            </div>
            <div class="steps">
                <div class="number">
                    2
                </div>
                <div class="step">
                    <p>Step 2</p>
                    <p>SELECT PLAN</p>
                </div>
            </div>
            <div class="steps">
                <div class="number">
                    3
                </div>
                <div class="step">
                    <p>Step 3</p>
                    <p>ADD-ONS</p>
                </div>
            </div>
            <div class="steps">
                <div class="number">
                    4
                </div>
                <div class="step">
                    <p>Step 4</p>
                    <p>SUMMARY</p>
                </div>
            </div>
        </div>
        <div class="personal-info">
            <h1>Personal Info</h1>
            <p>Please provide your name,email address, and phone number.</p>

            <div class="details">
                <div class="name">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="e.g.Stephen King">
                </div>
                <div class="email">
                    <label for="emailAddress">Email Address</label>
                    <input type="email" id="emailAddress" placeholder="e.g.stephenking@lorem.com">
                </div>
                <div class="phone">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g.+1 234 567 890">
                </div>
            </div>

            <button class="btn">Next Step</button>
        </div>
    </div>
</body>

</html>
