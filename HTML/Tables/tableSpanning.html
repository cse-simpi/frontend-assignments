<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 3px solid grey;
            border-spacing: 20px;
            border-collapse: collapse;
            background-color: antiquewhite;
        }
        th, td{
            padding: 10px;
            border: 2px solid brown;
        }
    </style>
</head>
<body>
    <table border = "2">
        <tr>
            <th>1</th>
            <th colspan="4">2</th>
        </tr>
        <tr>
            <td rowspan = "2">3</td>
            <td colspan = "2">4</td>
            <td colspan = "2">5</td>
        </tr>
        <tr>
            <td>6</td>
            <td colspan = "2">7</td>
            <td>8</td>
        </tr>
    </table>
</body>
</html>
