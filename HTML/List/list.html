<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- list -->
     <!-- ordered list -->
      <ol type = "a" start = "29" >
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ol>

      <!-- unordered list -->
       <ul type = "square">
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
       </ul>

       <ul type = "circle">
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
       </ul>

       <ul type = "disc">
        <ul type = "square"><li>HTML</li></ul>
        <ul type = "disc"><li>CSS</li></ul>
        <ul type = "circle"><li>Javascript</li></ul>
       </ul>

       <!-- description list -->
        <dl>
            <!-- description term -->
            <dt>HTML</dt>
            <dd>Hyper text markup language</dd>
            <dt>CSS</dt>
            <dd>Cascading Style Sheet</dd>
            <dt>JS</dt>
            <dd>JavaScript</dd>
        </dl>
</body>
</html>
