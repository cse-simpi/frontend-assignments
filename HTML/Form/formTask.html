<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .labels{
            display: inline-block;
            width: 100px;
        }
    </style>
</head>
<body>
    <h1>Form</h1>
    <form>

        <label for ="name" class = "labels">
        Name*
        </label>
        <input type = "text" id = "name" required>
        <br><br>
        <label for="address" class = "labels">Address</label>
        <input type="text" id = "address">
        <br><br>
        <label for ="zipcode" class = "labels">Zip Code*</label>
        <input type="tel" minLength="5" maxlength="5" required placeholder ="enter a 5-digit code">
        <br><br>
        <label for="country" class = "labels">Country*</label>
        <select name="country" id="country" required>
            <option value="pleaseSelect" selected disabled hidden>Please select...</option>
            <option value="afghanistan">Afghanistan</option>
            <option value="bangladesh">Bangladesh</option>
            <option value="china">China</option>
            <option value="denmark">Denmark</option>
            <option value="India">India</option>
            <option value="unitedStates">United States</option>
        </select>
        <br><br>
        <label for="gender" class = "labels">Gender*</label>
        <input type="radio" id = "male" name ="gender" required>
        <label for="male">Male</label>
        <input type="radio" id = "female" name ="gender">
        <label for="female">Female</label>
        <br><br>
        <label for="preferences" class = "labels">Preferences</label>
        <input type="checkbox" id ="red">
        <label for="red">Red</label>
        <input type="checkbox" id = "green" checked>
        <label for="green">Green</label>
        <input type="checkbox" id ="blue">
        <label for="blue">Blue</label>
        <br><br>
        <label for="phone" class = "labels">Phone*</label>
        <input type="tel" id ="phone" minlength="10" maxlength="10" required>
        <br><br>
        <label for="email" class = "labels">Email*</label>
        <input type="email" id="email" required>
        <br><br>
        <label for="password" class = "labels">Password*</label>
        <input type="password" id="password" minlength="6" maxlength="8" placeholder="6-8 characters" required>
        <br><br>
        <label for="verifyPassword" class = "labels">Verify Password*</label>
        <input type="password" id="verifiyPassword" minlength="6" maxlength="8" required>
        <br><br>
        <label for="birthday" class = "labels">Birthday*</label>
        <input type="date" id ="birthday" required>
        <br><br>
        <label for="appointment" class="labels">Appointment*</label>
        <input type="time" name="appointment" id="appointment" required>
        <br><br>
        <input type="submit" value="SEND">
        <input type="reset" value="CLEAR">

    </form>
</body>
</html>
