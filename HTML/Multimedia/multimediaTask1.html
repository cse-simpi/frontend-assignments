<html lang="en">

<head>

    <title>Document</title>
    <style>
        *{

        }
        td {
            padding: 10px;

        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        img{
            height: 100px;
            width: 100px;
            border-radius: 50%;
            border: 2px solid red;
        }
        th{
            background-color: rgb(76, 124, 171);
            padding: 20px;
        }

        h1{
            background-color: rgb(23, 23, 61);
            padding: 20px;
            width: 100vw;color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .parent-container{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        audio{
            display: block;
            width: 35vw;
        }
        table{
            border-collapse: collapse;
        
        }
        tr{
            border: 1px solid white;
        }
    </style>
</head>
